<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC26 · Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

:root{--r:#E8001C;--o:#F5640A;--y:#FFD100;--g:#00A651;--b:#0057A8;
  --cel:#74ACDF;--wh:#F4F8FF;--gold:#C9A84C;--goldb:#FFD700;--goldd:#7A5C10;
  --navy:#08101E;--soft:#8EA8CC;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-snap-type:y mandatory;overflow-y:scroll;overflow-x:hidden}
body{font-family:'Outfit',sans-serif;background:var(--navy);color:var(--wh);overflow-x:hidden;max-width:100vw}
#sbar{position:fixed;top:0;left:0;right:0;height:3px;z-index:400;display:flex;gap:1px;padding:0 2px;pointer-events:none}
.sb{flex:1;height:100%;background:rgba(255,255,255,.08);overflow:hidden}
.sbf{height:100%;width:0%;background:linear-gradient(90deg,var(--cel),var(--goldb),var(--r));transition:width .15s}
#topbar{position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(8,16,30,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
.tb-brand{display:flex;align-items:center;gap:10px;padding:7px 14px 5px}
.tb-brand .bfifa{height:26px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.tb-brand .bafa{height:20px;filter:drop-shadow(0 2px 5px rgba(201,168,76,.4))}
.tb-brand .bsep{width:1px;height:20px;background:rgba(255,255,255,.12)}
.tb-brand .btitle{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:.14em;color:var(--goldb)}
.tb-brand .bsub{font-size:.6rem;color:var(--soft);letter-spacing:.07em;margin-left:auto;white-space:nowrap}
.day-strip{display:flex;overflow-x:auto;gap:2px;padding:4px 6px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.dsb{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:4px 9px;border-radius:7px;border:none;background:transparent;cursor:pointer;transition:background .18s;min-width:36px}
.dsb .dn{font-family:'Bebas Neue';font-size:1rem;line-height:1;color:var(--wh);transition:color .18s}
.dsb .dm{font-size:.54rem;color:var(--soft);letter-spacing:.04em}
.dsb:hover,.dsb.act{background:rgba(255,255,255,.08)}
.dsb.act .dn{color:var(--goldb)}
.dsb.act .dm{color:var(--gold)}
.dsb.ism .dn{color:#f87}
.dsb.ism.act .dn{color:var(--r)}
.fifa-bar{height:2px;background:linear-gradient(90deg,var(--r),var(--o),var(--y),var(--g),var(--b))}
#hero{height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 35%,#0e2245 0%,var(--navy) 68%)}
#hero::before{content:'';position:absolute;inset:0;pointer-events:none;background:conic-gradient(from 195deg at 50% 105%,rgba(232,0,28,.13) 0deg,rgba(245,100,10,.1) 28deg,rgba(255,209,0,.08) 56deg,rgba(0,166,81,.1) 84deg,rgba(0,87,168,.13) 112deg,rgba(116,172,223,.07) 140deg,transparent 190deg)}
#hero::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(-52deg,transparent 0,transparent 36px,rgba(116,172,223,.04) 36px,rgba(116,172,223,.04) 38px)}
.h-logos{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:18px;position:relative;z-index:1}
.h-fifa{height:clamp(85px,22vw,120px);filter:drop-shadow(0 6px 28px rgba(0,0,0,.5))}
.h-sep{width:1px;height:clamp(48px,13vw,75px);background:linear-gradient(to bottom,transparent,rgba(116,172,223,.3),transparent)}
.h-afa{height:clamp(55px,14vw,75px);filter:drop-shadow(0 4px 15px rgba(201,168,76,.4))}
.h-eye{font-family:'Bebas Neue';font-size:clamp(.58rem,2.8vw,.82rem);letter-spacing:.44em;color:var(--gold);margin-bottom:8px;position:relative;z-index:1;text-align:center;padding:0 8px}
.h-title{font-family:'Bebas Neue';font-size:clamp(3.6rem,19vw,9rem);line-height:.86;text-align:center;position:relative;z-index:1}
.h-title .big{color:var(--wh);text-shadow:0 0 70px rgba(116,172,223,.2);display:block}
.h-title .acc{display:block;background:linear-gradient(135deg,var(--goldb),var(--gold),var(--goldd));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 8px rgba(201,168,76,.3))}
.h-sub{font-size:clamp(.78rem,3.5vw,1.05rem);font-weight:300;color:var(--cel);letter-spacing:.16em;margin-top:10px;position:relative;z-index:1;text-align:center;padding:0 16px}
.h-travelers{display:flex;gap:9px;margin-top:15px;position:relative;z-index:1;flex-wrap:wrap;justify-content:center;padding:0 12px}
.htc{border-radius:20px;padding:5px 14px;font-size:.73rem;font-weight:600;letter-spacing:.05em;border:1px solid}
.htc-p{background:rgba(116,172,223,.1);border-color:rgba(116,172,223,.3);color:var(--cel)}
.htc-a{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:#e8c96b}
.scroll-hint{position:absolute;bottom:22px;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--soft);font-size:.65rem;letter-spacing:.2em;animation:bounce 2.2s infinite;z-index:1}
.dc{min-height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;position:relative;overflow:hidden}
.dc::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg width='28' height='28' viewBox='0 0 28 28' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h4v4H0zm8 0h4v4H8zm8 0h4v4h-4zM4 4h4v4H4zm8 0h4v4h-4zm8 0h4v4h-4zM0 8h4v4H0zm16 0h4v4h-4zM4 12h4v4H4zm8 0h4v4h-4zm8 0h4v4h-4zM0 16h4v4H0zm8 0h4v4H8zm8 0h4v4h-4z' fill='%23ffffff'/%3E%3C/svg%3E")}
.t-fly{background:linear-gradient(158deg,#050f1e 0%,#0a1b33 55%,#08101e 100%)}
.t-match{background:linear-gradient(158deg,#130416 0%,#1e0922 45%,#08101e 100%)}
.t-drive{background:linear-gradient(158deg,#061421 0%,#0c1d30 55%,#08101e 100%)}
.t-free{background:linear-gradient(158deg,#071924 0%,#0b2030 55%,#08101e 100%)}
.arg-bar{height:3px;background:linear-gradient(90deg,var(--cel) 33%,#fff 33%,#fff 67%,var(--cel) 67%)}
.fc-bar{height:2px;background:linear-gradient(90deg,var(--r),var(--o),var(--y),var(--g),var(--b))}
.ch{padding:18px 18px 14px}
.ch-row{display:flex;justify-content:space-between;align-items:flex-start}
.ch-wd{font-size:.64rem;font-weight:700;letter-spacing:.27em;color:var(--soft);text-transform:uppercase;margin-bottom:3px}
.ch-date{display:flex;align-items:baseline;gap:8px}
.ch-day{font-family:'Bebas Neue';font-size:clamp(3.5rem,18vw,5rem);line-height:1;background:linear-gradient(135deg,var(--goldb) 0%,var(--gold) 60%,var(--goldd) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 6px rgba(201,168,76,.25))}
.ch-mo{font-family:'Bebas Neue';font-size:1.7rem;color:var(--cel);letter-spacing:.04em}
.ch-afa{height:36px;filter:drop-shadow(0 2px 7px rgba(201,168,76,.35))}
.ch-city{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(116,172,223,.08);border:1px solid rgba(116,172,223,.17);border-radius:18px;padding:5px 12px;font-size:.75rem;font-weight:600;color:var(--cel);letter-spacing:.04em}
.mb{margin-top:11px;padding:11px 13px;border-radius:12px;background:linear-gradient(135deg,rgba(232,0,28,.15),rgba(100,0,50,.08));border:1px solid rgba(232,0,28,.3);display:flex;align-items:center;gap:11px}
.mb-img{height:38px;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.mb-t{font-size:.9rem;font-weight:800;color:#ff8fa3;letter-spacing:.03em}
.mb-s{font-size:.67rem;color:rgba(255,143,163,.48);margin-top:1px}
.log{padding:10px 18px;display:flex;flex-wrap:wrap;gap:7px}
.lp{display:flex;align-items:flex-start;gap:6px;border-radius:9px;padding:7px 11px;font-size:.72rem;border:1px solid;max-width:100%}
.lp-fly{background:rgba(0,87,168,.1);border-color:rgba(0,87,168,.27);color:#88bbff}
.lp-hotel{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.2);color:#d4b060}
.lp-car{background:rgba(0,166,81,.08);border-color:rgba(0,166,81,.2);color:#70d499}
.lp-night{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:var(--soft)}
.lp-ic{font-size:.88rem;flex-shrink:0;margin-top:1px}
.ll{font-weight:700;font-size:.67rem;letter-spacing:.06em;display:block;margin-bottom:1px}
.lp-fly .ll{color:#a8ccff}.lp-hotel .ll{color:var(--goldb)}.lp-car .ll{color:#90ffbb}.lp-night .ll{color:var(--wh)}
.lv{display:block;line-height:1.4}
.hb{margin:0 18px 10px;border-radius:11px;padding:11px 13px;background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.14)}
.hb-name{font-size:.77rem;font-weight:700;color:#d4b060;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.hb-det{font-size:.69rem;color:var(--soft);line-height:1.5}
.gsep{height:1px;background:linear-gradient(90deg,transparent,var(--gold),rgba(201,168,76,.3),var(--gold),transparent);margin:0 18px;opacity:.28}
.tls{padding:10px 18px 22px;flex:1}
.tll{font-size:.58rem;font-weight:700;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:11px}
.tl{position:relative}
.tl::before{content:'';position:absolute;left:33px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,rgba(201,168,76,.3),rgba(116,172,223,.1),transparent)}
.tb2{display:flex;gap:12px;min-height:32px;align-items:stretch}
.th2{width:33px;flex-shrink:0;text-align:right;padding-top:6px;font-family:'Bebas Neue';font-size:.77rem;color:var(--soft);opacity:.55}
.tdc{width:9px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:8px}
.td{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.td-n{background:rgba(116,172,223,.4);border:1.5px solid var(--cel)}
.td-hi{background:var(--gold);border:1.5px solid var(--goldb)}
.td-mt{background:var(--r);border:1.5px solid #ff8fa3}
.td-rt{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1)}
.td-fl{background:rgba(0,87,168,.55);border:1.5px solid #80b8ff}
.tc2{flex:1;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center}
.ta{font-size:.82rem;font-weight:400;color:var(--wh);line-height:1.3}
.ta.hi{font-weight:700;color:#e8c96b}
.ta.mt{font-weight:800;color:#ff8fa3;font-size:.86rem}
.ta.fl{color:#88bbff;font-style:italic}
.ta.rt{color:var(--soft);opacity:.38;font-size:.72rem}
.wt{display:inline-block;font-size:.56rem;font-weight:700;border-radius:3px;padding:1px 5px;margin-left:5px;vertical-align:middle;letter-spacing:.04em}
.wt-p{background:rgba(116,172,223,.18);color:var(--cel);border:1px solid rgba(116,172,223,.27)}
.wt-a{background:rgba(201,168,76,.14);color:#e8c96b;border:1px solid rgba(201,168,76,.24)}
.cf{padding:9px 18px;background:rgba(0,0,0,.22);border-top:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center;font-size:.64rem;color:var(--soft)}
.cfg{background:linear-gradient(90deg,var(--goldd),var(--goldb),var(--goldd));background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}

</style>

const strip=document.getElementById('day-strip');
const sbar=document.getElementById('sbar');
const ICONS={'t-fly':'\u2708\ufe0f','t-match':'\u26bd','t-drive':'\ud83d\ude97','t-free':'\ud83c\udfd9\ufe0f','t-home':'\ud83c\udfe0'};
const wt=w=>w==='p'?'<span class="wt wt-p">PATO</span>':w==='a'?'<span class="wt wt-a">AGUS&PEDRO</span>':'';

DAYS.forEach((d,i)=>{
  const sg=document.createElement('div');sg.className='sb';
  const sf=document.createElement('div');sf.className='sbf';sf.id='sf'+i;
  sg.appendChild(sf);sbar.appendChild(sg);

  const btn=document.createElement('button');
  btn.className='dsb'+(d.match?' ism':'');
  btn.innerHTML='<span class="dn">'+d.day+'</span><span class="dm">'+d.mo+'</span>';
  btn.onclick=()=>document.getElementById('dc'+i).scrollIntoView({behavior:'smooth'});
  strip.appendChild(btn);

  const card=document.createElement('section');
  card.className='dc '+d.type;card.id='dc'+i;

  let h='<div class="arg-bar"></div><div class="ch">';
  h+='<div class="ch-row">';
  h+='<div><div class="ch-wd">'+ICONS[d.type]+' '+d.wd+'</div>';
  h+='<div class="ch-date"><div class="ch-day">'+d.day+'</div><div class="ch-mo">'+d.mo+'</div></div></div>';
  h+='<div>'+(d.match?'<img class="ch-afa" src="'+AFA_SRC+'" alt="AFA">':'')+'</div></div>';
  h+='<div class="ch-city">\ud83d\udccd '+d.city+'</div>';
  if(d.match) h+='<div class="mb"><img class="mb-img" src="'+FIFA_SRC+'" alt="FIFA"><div><div class="mb-t">\u26bd '+d.match.t+'</div><div class="mb-s">'+d.match.s+'</div></div></div>';
  h+='</div><div class="fc-bar"></div>';

  h+='<div class="log">';
  d.flights.forEach(f=>{
    const ic=f.info.includes('Llega')?'\ud83d\udeec':'\u2708\ufe0f';
    const lb=f.who==='p'?'PATO':f.who==='a'?'AGUS & PEDRO':'VUELO';
    h+='<div class="lp lp-fly"><span class="lp-ic">'+ic+'</span><div><span class="ll">'+lb+'</span><span class="lv">'+f.info+'</span></div></div>';
  });
  if(d.night) h+='<div class="lp lp-night"><span class="lp-ic">\ud83c\udf19</span><div><span class="ll">NOCHE</span><span class="lv">'+d.night+'</span></div></div>';
  if(d.car)   h+='<div class="lp lp-car"><span class="lp-ic">\ud83d\ude97</span><div><span class="ll">AUTO</span><span class="lv">Disponible</span></div></div>';
  h+='</div>';
  if(d.hotel) h+='<div class="hb"><div class="hb-name">\ud83c\udfe8 '+d.hotel+'</div>'+(d.det?'<div class="hb-det">'+d.det+'</div>':'')+'</div>';
  h+='<div class="gsep"></div>';

  h+='<div class="tls"><div class="tll">Programa del d\u00eda</div><div class="tl">';
  let pr=false;
  d.sched.forEach(s=>{
    if(s.c==='rt'){if(pr)return;pr=true;}else pr=false;
    const dc2=s.c==='hi'?'td-hi':s.c==='mt'?'td-mt':s.c==='rt'?'td-rt':s.c==='fl'?'td-fl':'td-n';
    const ac=s.c==='hi'?'hi':s.c==='mt'?'mt':s.c==='rt'?'rt':s.c==='fl'?'fl':'';
    h+='<div class="tb2"><div class="th2">'+s.h+'</div><div class="tdc"><div class="td '+dc2+'"></div></div><div class="tc2"><div class="ta '+ac+'">'+s.a+wt(s.w)+'</div></div></div>';
  });
  h+='</div></div>';
  h+='<div class="cf"><span>D\u00eda '+(i+1)+'/'+DAYS.length+'</span><span class="cfg">\ud83c\udfc6 Mundial USA 2026</span><span>'+d.mo+' '+d.day+'</span></div>';

  card.innerHTML=h;
  document.body.appendChild(card);
});

const sections=[...document.querySelectorAll('.dc')];
const navBtns=[...strip.querySelectorAll('.dsb')];
let cur=-1;
function setDay(i){
  if(i===cur)return;cur=i;
  navBtns.forEach((b,j)=>b.classList.toggle('act',j===i));
  if(navBtns[i])navBtns[i].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  DAYS.forEach((_,j)=>{const f=document.getElementById('sf'+j);if(f)f.style.width=j<i?'100%':j===i?'55%':'0%';});
}
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting&&e.intersectionRatio>.45)setDay(sections.indexOf(e.target));});
},{threshold:.45});
sections.forEach(s=>obs.observe(s));
const heroObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){cur=-1;navBtns.forEach(b=>b.classList.remove('act'));DAYS.forEach((_,j)=>{const f=document.getElementById('sf'+j);if(f)f.style.width='0%';});}});
},{threshold:.15});
heroObs.observe(document.getElementById('hero'));

</script>
